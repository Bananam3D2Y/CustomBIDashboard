<!doctype html>
<html lang="en">
<head>
  <!-- Ordinary head settings-->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Intelligence Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="all"> <!-- Overall site container -->
    <header>
      <div>
        <h1>Business Intelligence Dashboard</h1>
        <p>Placeholder header text</p>
      </div>
    </header>

    <!-- DASHBOARD, The central "dashboard" widgit, primary functionality of the site -->
    <div>Can be used to make querys of the form "SELECT X FROM T WHERE Y LIMIT Z"</div>
    <form id="dashboard_form">
      <label>Query:</label>
      <select id="dashboard_select">
        <option value="*">All Columns</option>
        <option value="ItemID">ItemID</option>
      </select>
      <select id="dashboard_from">
        <option value="Sample_Table">Sample Table</option>
      </select>
      <select id="dashboard_where">
        <option value="none">No Comparisons Yet</option>
      </select>
      <select id="dashboard_limit">
        <option value="10">10</option>
        <option value="100">100</option>
        <option value="1000">1000</option>
      </select>
      <input type="submit" value="run">
    </form>
    <table id="dashboard"></table>
    <!-- END DASHBOARD, table ^ is populated by "loadDatabase()" -->

  </div>
  <!-- Obligatory API call, better to do once per pageload than once for each function call -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  <script src="scripts/script.js"></script>


<footer>Placeholder footer text</footer>
</body>
</html>
